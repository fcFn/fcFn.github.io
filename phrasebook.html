<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrasebook</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover:not(.active) {
            color: #495057;
            background: rgba(102, 126, 234, 0.05);
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin: 0;
        }

        .language-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .language-selector label {
            font-weight: 600;
            color: #495057;
            margin: 0;
        }

        .language-selector select {
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .language-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border-left: 5px solid #667eea;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .language-stats {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .language-stats h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .language-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f3f4;
        }

        .language-item:last-child {
            border-bottom: none;
        }

        .language-name {
            font-weight: 600;
            color: #333;
        }

        .language-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .phrase-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border-left: 5px solid #667eea;
            transition: transform 0.2s ease;
        }

        .phrase-card:hover {
            transform: translateX(5px);
        }

        .phrase-original {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .word-link {
            color: #667eea;
            text-decoration: none;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: inline-block;
            position: relative;
            cursor: pointer;
        }

        .word-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
            text-decoration: none;
        }

        .word-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1000;
            margin-bottom: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .word-tooltip.show {
            opacity: 1;
        }

        .word-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: #333;
        }

        .word-tooltip.success {
            background: #28a745;
            cursor: pointer;
        }

        .word-tooltip.success::after {
            border-top-color: #28a745;
        }

        .word-tooltip.error {
            background: #dc3545;
        }

        .word-tooltip.error::after {
            border-top-color: #dc3545;
        }

        .word-tooltip.loading {
            background: #667eea;
        }

        .word-tooltip.loading::after {
            border-top-color: #667eea;
        }

        .phrase-translation {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }

        .phrase-pronunciation {
            font-size: 14px;
            color: #888;
            font-style: italic;
            margin-bottom: 10px;
        }

        .delete-btn {
            background: #dc3545;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
        }

        .delete-btn:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container" x-data="phrasebook()">
        <div class="header">
            <h1>📚 My Phrasebook</h1>
            <div class="language-selector">
                <label for="language">Language:</label>
                <select id="language" x-model="currentLanguage" @change="saveLanguage()">
                    <option value="he">Hebrew</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="zh">Chinese</option>
                    <option value="ar">Arabic</option>
                    <option value="hi">Hindi</option>
                    <option value="th">Thai</option>
                    <option value="vi">Vietnamese</option>
                    <option value="pl">Polish</option>
                    <option value="nl">Dutch</option>
                    <option value="sv">Swedish</option>
                    <option value="da">Danish</option>
                    <option value="no">Norwegian</option>
                    <option value="fi">Finnish</option>
                    <option value="tr">Turkish</option>
                </select>
            </div>
        </div>

        <div class="tabs">
            <button class="tab" :class="{ active: activeTab === 'phrases' }" @click="activeTab = 'phrases'">
                📝 Phrases
            </button>
            <button class="tab" :class="{ active: activeTab === 'stats' }" @click="activeTab = 'stats'">
                📊 Stats
            </button>
        </div>

        <div x-show="activeTab === 'phrases'">
            <div class="add-form">
                <form @submit.prevent="addPhrase()">
                    <div class="form-group">
                        <label for="original">Original Phrase:</label>
                        <input type="text" id="original" x-model="form.original" required placeholder="Enter the original phrase">
                    </div>

                    <div class="form-group">
                        <label for="translation">Translation:</label>
                        <input type="text" id="translation" x-model="form.translation" required placeholder="Enter the translation">
                    </div>

                    <div class="form-group">
                        <label for="pronunciation">Pronunciation (optional):</label>
                        <input type="text" id="pronunciation" x-model="form.pronunciation" placeholder="Enter pronunciation guide">
                    </div>

                    <button type="submit">Add Phrase</button>
                </form>
            </div>

            <div class="phrase-list">
                <div id="phrases">
                    <template x-if="phrases.length === 0">
                        <div class="empty-state">No phrases added yet for <span x-text="getLanguageName(currentLanguage)"></span>. Add your first phrase above!</div>
                    </template>

                    <template x-for="phrase in phrases" :key="phrase.id">
                        <div class="phrase-card">
                            <div class="phrase-original"
                                 x-html="createWordLinks(phrase.original)"
                                 @mouseleave="hideTooltips($event)"></div>
                            <div class="phrase-translation" x-text="phrase.translation"></div>
                            <div class="phrase-pronunciation" x-show="phrase.pronunciation" x-text="'[' + phrase.pronunciation + ']'"></div>
                            <button class="delete-btn" @click="deletePhrase(phrase.id)">Delete</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="activeTab === 'stats'">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" x-text="totalPhrases"></div>
                    <div class="stat-label">Total Phrases</div>
                </div>

                <div class="stat-card">
                    <div class="stat-number" x-text="languageCount"></div>
                    <div class="stat-label">Languages</div>
                </div>

                <div class="stat-card">
                    <div class="stat-number" x-text="phrasesWithPronunciation"></div>
                    <div class="stat-label">With Pronunciation</div>
                </div>

                <div class="stat-card">
                    <div class="stat-number" x-text="averageWordsPerPhrase"></div>
                    <div class="stat-label">Avg Words/Phrase</div>
                </div>
            </div>

            <div class="language-stats">
                <h3>📈 Phrases by Language</h3>
                <template x-for="[lang, phrases] in languageBreakdown" :key="lang">
                    <div class="language-item">
                        <span class="language-name" x-text="getLanguageName(lang)"></span>
                        <span class="language-count" x-text="phrases.length"></span>
                    </div>
                </template>

                <template x-if="languageBreakdown.length === 0">
                    <div class="empty-state">No phrases added yet. Start adding some phrases to see statistics!</div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function phrasebook() {
            return {
                activeTab: 'phrases',
                phrasesByLanguage: {},
                currentLanguage: 'he',
                form: {
                    original: '',
                    translation: '',
                    pronunciation: ''
                },

                languageNames: {
                    'he': 'Hebrew',
                    'es': 'Spanish',
                    'fr': 'French',
                    'de': 'German',
                    'it': 'Italian',
                    'pt': 'Portuguese',
                    'ru': 'Russian',
                    'ja': 'Japanese',
                    'ko': 'Korean',
                    'zh': 'Chinese',
                    'ar': 'Arabic',
                    'hi': 'Hindi',
                    'th': 'Thai',
                    'vi': 'Vietnamese',
                    'pl': 'Polish',
                    'nl': 'Dutch',
                    'sv': 'Swedish',
                    'da': 'Danish',
                    'no': 'Norwegian',
                    'fi': 'Finnish',
                    'tr': 'Turkish'
                },

                // Cache for Forvo link status
                forvoCache: {},

                get phrases() {
                    return this.phrasesByLanguage[this.currentLanguage] || [];
                },

                get totalPhrases() {
                    return Object.values(this.phrasesByLanguage).reduce((total, phrases) => total + phrases.length, 0);
                },

                get languageCount() {
                    return Object.keys(this.phrasesByLanguage).filter(lang => this.phrasesByLanguage[lang].length > 0).length;
                },

                get phrasesWithPronunciation() {
                    return Object.values(this.phrasesByLanguage).flat().filter(phrase => phrase.pronunciation.trim()).length;
                },

                get averageWordsPerPhrase() {
                    const allPhrases = Object.values(this.phrasesByLanguage).flat();
                    if (allPhrases.length === 0) return 0;

                    const totalWords = allPhrases.reduce((total, phrase) => {
                        return total + phrase.original.split(' ').length;
                    }, 0);

                    return Math.round(totalWords / allPhrases.length * 10) / 10;
                },

                get languageBreakdown() {
                    return Object.entries(this.phrasesByLanguage)
                        .filter(([lang, phrases]) => phrases.length > 0)
                        .sort((a, b) => b[1].length - a[1].length);
                },

                init() {
                    this.loadData();
                },

                loadData() {
                    // Load phrases by language
                    const stored = localStorage.getItem('phrasebook_by_language');
                    if (stored) {
                        this.phrasesByLanguage = JSON.parse(stored);
                    } else {
                        // Default sample phrase for Hebrew
                        this.phrasesByLanguage = {
                            he: [{
                                id: 1,
                                original: "ראית את האלגוריתמים החדשים שפורסמו זה עתה בווירד או באיזה מגזין אחר?",
                                translation: "Have you seen those new algorithms that were just published in Wired or some other magazine?",
                                pronunciation: "ra-EE-ta et ha-al-go-REET-meem ha-kha-da-SHEEM she-poor-se-MU ze e-TAH be-WIRED o be-EI-ze ma-ga-ZEEN a-KHER?"
                            }]
                        };
                    }

                    // Load language
                    this.currentLanguage = localStorage.getItem('phrasebook_language') || 'he';
                },

                savePhrases() {
                    localStorage.setItem('phrasebook_by_language', JSON.stringify(this.phrasesByLanguage));
                },

                saveLanguage() {
                    localStorage.setItem('phrasebook_language', this.currentLanguage);
                },

                getLanguageName(code) {
                    return this.languageNames[code] || code.toUpperCase();
                },

                createWordLinks(text) {
                    return text.split(' ').map(word => {
                        const cleanWord = word.replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
                        if (cleanWord) {
                            const encodedWord = encodeURIComponent(cleanWord);
                            const cacheKey = `${cleanWord}-${this.currentLanguage}`;
                            return `<span class="word-link"
                                        data-word="${cleanWord}"
                                        data-language="${this.currentLanguage}"
                                        data-cache-key="${cacheKey}"
                                        @mouseenter="checkForvoLink($event)"
                                        @click="handleWordClick($event)">${word}
                                        <div class="word-tooltip"></div>
                                    </span>`;
                        }
                        return word;
                    }).join(' ');
                },

                async checkForvoLink(event) {
                    const element = event.target;
                    const tooltip = element.querySelector('.word-tooltip');
                    const cacheKey = element.dataset.cacheKey;
                    const word = element.dataset.word;
                    const language = element.dataset.language;

                    // Show tooltip
                    tooltip.classList.add('show');

                    // Check cache first
                    if (this.forvoCache[cacheKey] !== undefined) {
                        console.log(`💾 Forvo check - "${word}" (${language}): CACHED -`, this.forvoCache[cacheKey].exists ? 'EXISTS' : 'NOT FOUND');
                        this.showCachedResult(tooltip, this.forvoCache[cacheKey], word);
                        return;
                    }

                    // Show loading state
                    tooltip.textContent = 'Checking pronunciation...';
                    tooltip.className = 'word-tooltip show loading';

                    try {
                        const encodedWord = encodeURIComponent(word);
                        const url = `https://forvo.com/word/${encodedWord}/#${language}`;

                        // Use fetch to check if the page exists
                        const response = await fetch(url, {
                            method: 'HEAD',
                            mode: 'no-cors' // This will limit what we can check, but avoids CORS issues
                        });

                        // Note: With no-cors, we can't actually check the status
                        // So we'll use a different approach - try to load as image to test
                        const testUrl = `https://forvo.com/word/${encodedWord}/`;
                        const img = new Image();

                        img.onload = () => {
                            this.forvoCache[cacheKey] = { exists: true, url };
                            console.log(`✅ Forvo check - "${word}" (${language}): EXISTS - ${url}`);
                            this.showCachedResult(tooltip, this.forvoCache[cacheKey], word);
                        };

                        img.onerror = () => {
                            this.forvoCache[cacheKey] = { exists: false };
                            console.log(`❌ Forvo check - "${word}" (${language}): NOT FOUND`);
                            this.showCachedResult(tooltip, this.forvoCache[cacheKey], word);
                        };

                        // Set a timeout for the test
                        setTimeout(() => {
                            if (this.forvoCache[cacheKey] === undefined) {
                                // Assume it exists if we can't determine (better UX)
                                this.forvoCache[cacheKey] = { exists: true, url };
                                console.log(`⏱️ Forvo check - "${word}" (${language}): TIMEOUT - assuming exists - ${url}`);
                                this.showCachedResult(tooltip, this.forvoCache[cacheKey], word);
                            }
                        }, 2000);

                        img.src = testUrl + 'favicon.ico'; // Try to load a small resource

                    } catch (error) {
                        // On error, assume the link works (better UX than blocking)
                        const url = `https://forvo.com/word/${encodeURIComponent(word)}/#${language}`;
                        this.forvoCache[cacheKey] = { exists: true, url };
                        console.log(`⚠️ Forvo check - "${word}" (${language}): ERROR - assuming exists - ${url}`, error);
                        this.showCachedResult(tooltip, this.forvoCache[cacheKey], word);
                    }
                },

                showCachedResult(tooltip, cached, word) {
                    if (cached.exists) {
                        tooltip.textContent = `Click to hear "${word}"`;
                        tooltip.className = 'word-tooltip show success';
                    } else {
                        tooltip.textContent = 'Pronunciation not available';
                        tooltip.className = 'word-tooltip show error';
                    }
                },

                handleWordClick(event) {
                    const element = event.target;
                    const cacheKey = element.dataset.cacheKey;
                    const word = element.dataset.word;
                    const language = element.dataset.language;

                    // Check if we have cached result
                    if (this.forvoCache[cacheKey] && this.forvoCache[cacheKey].exists) {
                        window.open(this.forvoCache[cacheKey].url, '_blank');
                    } else if (this.forvoCache[cacheKey] === undefined) {
                        // If not checked yet, open anyway (fallback)
                        const url = `https://forvo.com/word/${encodeURIComponent(word)}/#${language}`;
                        window.open(url, '_blank');
                    }
                    // If cached as non-existent, do nothing (already shown in tooltip)
                },

                addPhrase() {
                    if (this.form.original.trim() && this.form.translation.trim()) {
                        const phrase = {
                            id: Date.now(),
                            original: this.form.original.trim(),
                            translation: this.form.translation.trim(),
                            pronunciation: this.form.pronunciation.trim()
                        };

                        // Initialize language array if it doesn't exist
                        if (!this.phrasesByLanguage[this.currentLanguage]) {
                            this.phrasesByLanguage[this.currentLanguage] = [];
                        }

                        this.phrasesByLanguage[this.currentLanguage].push(phrase);
                        this.savePhrases();

                        // Reset form
                        this.form = {
                            original: '',
                            translation: '',
                            pronunciation: ''
                        };
                    }
                },

                deletePhrase(id) {
                    if (this.phrasesByLanguage[this.currentLanguage]) {
                        this.phrasesByLanguage[this.currentLanguage] = this.phrasesByLanguage[this.currentLanguage].filter(phrase => phrase.id !== id);
                        this.savePhrases();
                    }
                },

                hideTooltips(event) {
                    const tooltips = event.target.querySelectorAll('.word-tooltip');
                    tooltips.forEach(tooltip => {
                        tooltip.classList.remove('show');
                    });
                }
            }
        }
    </script>
</body>
</html>
